services:
  app:
    build: .
    container_name: api-modelo
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
    ports:
      - "xxxx:xxxx"
    environment:
      - PORT=xxxx
      - APINAME=api-modelo
      - AMBIENTE=DEV
    logging:
      driver: "fluentd"
      options:
        fluentd-address: 172.17.0.1:24224
        tag: api-modelo.logs
networks:
  default:
    name: 
      efk-network
    external:
      true
